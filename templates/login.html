<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiWeb Trading — Acceso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0d1117;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .login-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
        }

        .logo h1 {
            color: #e6edf3;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .logo p {
            color: #7d8590;
            font-size: 13px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            color: #7d8590;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 15px;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #58a6ff;
        }

        .btn-login {
            width: 100%;
            background: #238636;
            border: 1px solid #2ea043;
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            padding: 11px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
            letter-spacing: 0.3px;
        }

        .btn-login:hover {
            background: #2ea043;
        }

        .error-msg {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.4);
            border-radius: 6px;
            color: #f85149;
            font-size: 13px;
            padding: 10px 14px;
            margin-bottom: 16px;
            text-align: center;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: #484f58;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <span class="logo-icon">📈</span>
            <h1>MiWeb Trading</h1>
            <p>Plataforma de análisis bursátil</p>
        </div>

        {% if error %}
        <div class="error-msg">
            ❌ {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="username" autocomplete="username"
                       autofocus placeholder="usuario" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" autocomplete="current-password"
                       placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Entrar →</button>
        </form>

        <div class="footer">trading.salvanavegacion.es</div>
    </div>
</body>
</html>
