services:
  - type: web
    name: miweb-trading
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: EODHD_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
    plan: free
